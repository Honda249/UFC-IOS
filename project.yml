name: WalletApp
options:
  bundleIdPrefix: sa.wallet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_TESTABILITY: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      GCC_OPTIMIZATION_LEVEL: s
      STRIP_SWIFT_SYMBOLS: YES
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_COMPILATION_MODE: wholemodule

packages:
  TrustKit:
    url: https://github.com/datatheorem/TrustKit
    from: 3.0.0
  SwiftUUIDV7:
    url: https://github.com/mhayes853/swift-uuidv7
    from: 0.6.0
  LDSwiftEventSource:
    url: https://github.com/launchdarkly/swift-eventsource
    from: 3.0.0
  Nuke:
    url: https://github.com/kean/Nuke
    from: 12.0.0
  IOSSecuritySuite:
    url: https://github.com/securing/IOSSecuritySuite
    from: 1.9.0

targets:
  WalletApp:
    type: application
    platform: iOS
    sources:
      - path: WalletApp
        excludes:
          - "**/.gitkeep"
    resources:
      - path: WalletApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sa.wallet.app
        INFOPLIST_FILE: WalletApp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    dependencies:
      - package: TrustKit
        product: TrustKit
      - package: SwiftUUIDV7
        product: UUIDV7
      - package: LDSwiftEventSource
        product: LDSwiftEventSource
      - package: Nuke
        product: Nuke
      - package: IOSSecuritySuite
        product: IOSSecuritySuite
  WalletAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WalletAppTests
    dependencies:
      - target: WalletApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sa.wallet.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  WalletApp:
    build:
      targets:
        WalletApp: all
        WalletAppTests: [test]
    test:
      targets:
        - WalletAppTests
    run:
      config: Debug
